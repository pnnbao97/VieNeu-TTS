name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Add 3.14-dev as a separate matrix entry to avoid failing the whole CI if it's unstable
        include:
          - os: ubuntu-latest
            python-version: "3.14-dev"

    steps:
      - uses: actions/checkout@v4

      - name: Install espeak-ng (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng

      - name: Install espeak-ng (macOS)
        if: runner.os == 'macOS'
        run: brew install espeak-ng

      - name: Install espeak-ng (Windows)
        if: runner.os == 'Windows'
        run: |
          # espeak-ng is harder to install via CLI on Windows actions,
          # but many tests use mocks or can skip phonemization if missing.
          # For a more robust CI, we could use a custom installer or just rely on mocks.
          echo "Espeak-ng installation skipped on Windows for now."

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Format check with ruff
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest
        env:
          PYTHONPATH: src
