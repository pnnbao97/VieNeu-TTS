name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Core Test (Python 3.12, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install espeak-ng (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng

      - name: Install espeak-ng (macOS)
        if: runner.os == 'macOS'
        run: brew install espeak-ng

      - name: Install espeak-ng (Windows)
        if: runner.os == 'Windows'
        run: echo "Espeak-ng installation skipped on Windows for now."

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Format check with ruff
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest
        env:
          PYTHONPATH: src

  sdk-compatibility:
    name: SDK Compatibility (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    # Python 3.13 and 3.14-dev might still fail due to upstream missing wheels (e.g. llama-cpp-python)
    continue-on-error: ${{ matrix.python-version == '3.13' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install VieNeu SDK (Base)
        run: uv pip install . --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/metal/ --extra-index-url https://pnnbao97.github.io/llama-cpp-python-v0.3.16/cpu/ --no-cache-dir

      - name: Verify Import
        run: python -c "import vieneu; print('VieNeu SDK imported successfully')"
